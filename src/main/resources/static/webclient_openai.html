<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebClient OpenAI Test</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #20242a;
      background: #f5f7f8;
    }

    body {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.2;
    }

    form {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    textarea,
    button {
      box-sizing: border-box;
      padding: 11px 12px;
      border: 1px solid #cbd2d9;
      font: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      background: #fff;
    }

    button {
      width: fit-content;
      min-width: 100px;
      background: #243447;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #result {
      min-height: 260px;
      padding: 14px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      border: 1px solid #d5dbe0;
      background: #fff;
    }

    @media (max-width: 560px) {
      body {
        margin: 20px auto;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>WebClient OpenAI Test</h1>

  <form id="chatForm">
    <label for="message">
      Message
      <textarea id="message" required>OpenAI API를 WebClient로 직접 호출한 응답인지 짧게 설명해줘.</textarea>
    </label>
    <button id="sendBtn" type="submit">Send</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById("chatForm");
    const messageInput = document.getElementById("message");
    const result = document.getElementById("result");
    const sendBtn = document.getElementById("sendBtn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      result.textContent = "Loading...";
      sendBtn.disabled = true;

      try {
        const response = await fetch(`/api/webclient/openai/chat?q=${encodeURIComponent(message)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        result.textContent = await response.text();
      } catch (error) {
        result.textContent = `Error: ${error.message}`;
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });
  </script>
</body>
</html>
