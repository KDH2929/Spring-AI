<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatClient Ollama Memory Stream Test</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #1f2328;
      background: #f6f8fa;
    }

    body {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    .chat-shell {
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    input,
    button {
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #c9d1d9;
      font: inherit;
    }

    input {
      width: 100%;
      background: #fff;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: stretch;
    }

    button {
      min-width: 92px;
      background: #24292f;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #24292f;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #chatBox {
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 420px;
      padding: 14px;
      overflow-y: auto;
      border: 1px solid #d0d7de;
      background: #fff;
    }

    .msg {
      max-width: 78%;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .me {
      align-self: flex-end;
      background: #ddf4ff;
    }

    .ai {
      align-self: flex-start;
      background: #f6f8fa;
    }

    .error {
      align-self: flex-start;
      background: #fff1f0;
      border-color: #ffccc7;
    }

    @media (max-width: 620px) {
      body {
        margin: 20px auto;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <h1>ChatClient Ollama Memory Stream Test</h1>

    <div class="field">
      <label for="userId">Conversation ID</label>
      <input id="userId" type="text" value="ollama-user-1">
    </div>

    <div id="chatBox"></div>

    <div class="field">
      <label for="message">Message</label>
      <div class="composer">
        <input id="message" type="text" value="내 이름은 민수야. 기억해줘.">
        <button id="sendBtn" type="button">Send</button>
        <button id="stopBtn" class="secondary" type="button" disabled>Stop</button>
      </div>
    </div>
  </div>

  <script>
    let eventSource = null;
    let currentAiMessage = null;
    let isStreaming = false;

    const chatBox = document.getElementById("chatBox");
    const userIdInput = document.getElementById("userId");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = `msg ${who === "me" ? "me" : "ai"}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function setStreaming(nextValue) {
      isStreaming = nextValue;
      sendBtn.disabled = nextValue;
      stopBtn.disabled = !nextValue;
    }

    function closeStream() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      setStreaming(false);
      currentAiMessage = null;
    }

    function startStreamChat() {
      const userId = userIdInput.value.trim();
      const message = messageInput.value.trim();
      if (!userId || !message || isStreaming) return;

      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }

      addMessage(message, "me");
      messageInput.value = "";

      let buffer = "";
      currentAiMessage = addMessage("", "ai");
      setStreaming(true);

      const url = `/api/chatclient/ollama/chat/memory/stream?id=${encodeURIComponent(userId)}&q=${encodeURIComponent(message)}`;
      eventSource = new EventSource(url);

      eventSource.onmessage = (event) => {
        if (event.data === "[[END]]") {
          closeStream();
          messageInput.focus();
          return;
        }

        buffer += event.data;
        currentAiMessage.textContent = buffer;
        chatBox.scrollTop = chatBox.scrollHeight;
      };

      eventSource.onerror = () => {
        if (currentAiMessage && !buffer) {
          currentAiMessage.className = "msg error";
          currentAiMessage.textContent = "Ollama memory stream connection error";
        }
        closeStream();
      };
    }

    sendBtn.addEventListener("click", startStreamChat);
    stopBtn.addEventListener("click", closeStream);
    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startStreamChat();
      }
    });
  </script>
</body>
</html>
