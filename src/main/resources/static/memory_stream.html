<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Memory Stream Test</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #1f2328;
      background: #f6f8fa;
    }

    body {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    .chat-shell {
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    input,
    button {
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #c9d1d9;
      font: inherit;
    }

    input {
      width: 100%;
      background: #fff;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: stretch;
    }

    button {
      min-width: 92px;
      background: #24292f;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #3b424a;
    }

    #chatBox {
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 420px;
      padding: 14px;
      overflow-y: auto;
      border: 1px solid #d0d7de;
      background: #fff;
    }

    .msg {
      max-width: 78%;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .msg.me {
      align-self: flex-end;
      background: #ddf4ff;
    }

    .msg.ai {
      align-self: flex-start;
      background: #f6f8fa;
    }

    @media (max-width: 560px) {
      body {
        margin: 20px auto;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <h1>Chat Memory Stream Test</h1>

    <div class="field">
      <label for="userId">User ID</label>
      <input id="userId" type="text" value="user01">
    </div>

    <div id="chatBox"></div>

    <div class="field">
      <label for="message">Message</label>
      <div class="composer">
        <input id="message" type="text" placeholder="메시지를 입력하세요">
        <button id="sendBtn">전송</button>
      </div>
    </div>
  </div>

  <script>
    let es = null;
    let currentAiDiv = null;
    let isStreaming = false;

    const chatBox = document.getElementById("chatBox");

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = `msg ${who === "me" ? "me" : "ai"}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function createNewAiMessage() {
      currentAiDiv = document.createElement("div");
      currentAiDiv.className = "msg ai";
      chatBox.appendChild(currentAiDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateAiMessage(text) {
      if (!currentAiDiv) {
        createNewAiMessage();
      }

      currentAiDiv.textContent = text;
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function finalizeAiMessage(text) {
      if (currentAiDiv) {
        currentAiDiv.textContent = text;
        currentAiDiv = null;
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    async function startStreamChat() {

      // trim을 통해 앞 뒤의 공백을 제거
      const userId = document.getElementById("userId").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!userId || !message) return;

      if (isStreaming) {
        alert("이전 스트림이 아직 진행 중입니다.");
        return;
      }

      if (es) {
        es.close();
        es = null;
      }

      addMessage(message, "me");
      document.getElementById("message").value = "";

      let buffer = "";
      currentAiDiv = null;
      isStreaming = true;

      const url = `/chat/stream?id=${encodeURIComponent(userId)}&q=${encodeURIComponent(message)}`;
      es = new EventSource(url);

      es.onmessage = (event) => {
        if (event.data === "[[END]]") {
          es.close();
          es = null;
          isStreaming = false;
          finalizeAiMessage(buffer);
          return;
        }

        buffer += event.data;
        updateAiMessage(buffer);
      };

      es.onerror = () => {
        if (es) {
          es.close();
          es = null;
        }
        isStreaming = false;
        finalizeAiMessage(buffer || "스트림 연결이 종료되었습니다.");
      };
    }

    document.getElementById("sendBtn").addEventListener("click", startStreamChat);
    document.getElementById("message").addEventListener("keypress", (event) => {
      if (event.key === "Enter") {
        startStreamChat();
      }
    });
  </script>
</body></html>
</html>
