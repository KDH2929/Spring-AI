<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatClient Ollama Stream Test</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #20242a;
      background: #f5f7f8;
    }

    body {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    .shell {
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: stretch;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    input,
    button {
      box-sizing: border-box;
      padding: 11px 12px;
      border: 1px solid #cbd2d9;
      font: inherit;
    }

    input {
      width: 100%;
      background: #fff;
    }

    button {
      min-width: 92px;
      background: #243447;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #243447;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #chatBox {
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 440px;
      padding: 14px;
      overflow-y: auto;
      border: 1px solid #d5dbe0;
      background: #fff;
    }

    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border: 1px solid #d5dbe0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .me {
      align-self: flex-end;
      background: #e8f3ff;
    }

    .ai {
      align-self: flex-start;
      background: #f7f7f2;
    }

    .error {
      align-self: flex-start;
      background: #fff1f0;
      border-color: #ffccc7;
    }

    @media (max-width: 620px) {
      body {
        margin: 20px auto;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>ChatClient Ollama Stream Test</h1>

    <div id="chatBox"></div>

    <label for="message">
      Message
      <div class="composer">
        <input id="message" type="text" value="스트리밍으로 한 문단만 답해줘.">
        <button id="sendBtn" type="button">Send</button>
        <button id="stopBtn" class="secondary" type="button" disabled>Stop</button>
      </div>
    </label>
  </main>

  <script>
    let eventSource = null;
    let currentAiMessage = null;
    let isStreaming = false;

    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");

    function appendMessage(text, type) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function setStreaming(nextValue) {
      isStreaming = nextValue;
      sendBtn.disabled = nextValue;
      stopBtn.disabled = !nextValue;
    }

    function closeStream() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      setStreaming(false);
      currentAiMessage = null;
    }

    function startStream() {
      const message = messageInput.value.trim();
      if (!message || isStreaming) return;

      appendMessage(message, "me");
      messageInput.value = "";

      currentAiMessage = appendMessage("", "ai");
      let buffer = "";
      setStreaming(true);

      const url = `/api/chatclient/ollama/chat/stream?q=${encodeURIComponent(message)}`;
      eventSource = new EventSource(url);

      eventSource.onmessage = (event) => {
        if (event.data === "[[END]]") {
          closeStream();
          messageInput.focus();
          return;
        }

        buffer += event.data;
        currentAiMessage.textContent = buffer;
        chatBox.scrollTop = chatBox.scrollHeight;
      };

      eventSource.onerror = () => {
        if (currentAiMessage && !buffer) {
          currentAiMessage.className = "msg error";
          currentAiMessage.textContent = "Ollama stream connection error";
        }
        closeStream();
      };
    }

    sendBtn.addEventListener("click", startStream);
    stopBtn.addEventListener("click", closeStream);
    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startStream();
      }
    });
  </script>
</body>
</html>
